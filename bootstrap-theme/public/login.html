<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate SaaS - Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex align-items-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <h2 class="fw-bold"><i class="bi bi-box-fill icon"></i>CorporateSaaS</h2>
                    </a>
                </div>

                <div class="card p-4 shadow-sm border-0" id="auth-card" style="border: 1px solid #e0e0e0 !important;">
                    <!-- Alert Box -->
                    <div id="auth-alert" class="alert d-none mb-3" role="alert">
                        <i id="auth-alert-icon" class="bi bi-exclamation-circle me-2"></i>
                        <span id="auth-alert-msg"></span>
                    </div>

                    <!-- LOGIN FORM -->
                    <div id="login-container">
                        <h4 class="fw-bold text-center mb-4">Sign In</h4>
                        <form id="login-form" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope icon m-0"></i></span>
                                    <input type="email" id="login-email" class="form-control"
                                        placeholder="name@company.com" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock icon m-0"></i></span>
                                    <input type="password" id="login-password" class="form-control"
                                        placeholder="Enter password (min 6 char)" minlength="6" required>
                                    <button class="btn border toggle-password" type="button"
                                        data-target="login-password"
                                        style="border-color: #e0e0e0; background-color: #ffffff;">
                                        <i class="bi bi-eye icon m-0" style="color: #1B5E20;"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Remember Me Checkbox -->
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="remember-me"
                                    style="border-color: #1B5E20; cursor: pointer;">
                                <label class="form-check-label fw-bold" for="remember-me"
                                    style="cursor: pointer;">Remember Me</label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2" id="login-btn"><i
                                    class="bi bi-box-arrow-in-right icon text-white"></i> Sign In</button>

                            <div class="text-center mt-3">
                                <a href="#" id="show-register" class="small fw-bold text-decoration-underline"
                                    style="color: #1B5E20;">Create an account</a>
                            </div>
                        </form>
                    </div>

                    <!-- REGISTER FORM -->
                    <div id="register-container" class="d-none">
                        <h4 class="fw-bold text-center mb-4">Sign Up</h4>
                        <form id="register-form" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person icon m-0"></i></span>
                                    <input type="text" id="reg-name" class="form-control" placeholder="John Doe"
                                        required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope icon m-0"></i></span>
                                    <input type="email" id="reg-email" class="form-control"
                                        placeholder="name@company.com" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Password</label>
                                <div class="input-group mb-1">
                                    <span class="input-group-text"><i class="bi bi-lock icon m-0"></i></span>
                                    <input type="password" id="reg-password" class="form-control"
                                        placeholder="Enter password (min 6 char)" minlength="6" required>
                                    <button class="btn border toggle-password" type="button" data-target="reg-password"
                                        style="border-color: #e0e0e0; background-color: #ffffff;">
                                        <i class="bi bi-eye icon m-0" style="color: #1B5E20;"></i>
                                    </button>
                                </div>
                                <!-- Password Strength Indicator -->
                                <div id="pwd-strength" class="small fw-bold mt-1">Strength: <span
                                        id="pwd-strength-text">Empty</span></div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2"><i
                                    class="bi bi-person-plus icon text-white"></i> Sign Up</button>

                            <div class="text-center mt-3">
                                <a href="#" id="show-login" class="small fw-bold text-decoration-underline"
                                    style="color: #1B5E20;">Already have an account? Sign In</a>
                            </div>
                        </form>
                    </div>

                    <div class="text-center mt-3 border-top pt-3">
                        <a href="index.html" class="small fw-bold">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
